name: Create GCS bucket

on:
  workflow_dispatch:
    inputs:
      port_context:
        required: true
        description: Includes the entity identifier, and the action's run id
      name:
        required: true
        description: The name of the new GCS bucket
        type: string
      visibility:
        required: true
        description: The visibility of the new GCS bucket (public or private)
        type: string

jobs:
  createResource:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Terraform file from template
        run: |
          mkdir -p resources
          cp templates/cloudResource.tf resources/${{ inputs.name }}.tf
          sed -i 's/{{ bucket_name }}/${{ inputs.name }}/g' resources/${{ inputs.name }}.tf
          if [ "${{ inputs.visibility }}" = "public" ]; then
            sed -i 's/{{ bucket_acl }}/publicRead/g' resources/${{ inputs.name }}.tf
          else
            sed -i 's/{{ bucket_acl }}/private/g' resources/${{ inputs.name }}.tf
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create GCP provider file
        run: |
          cat > resources/provider.tf << EOF
          terraform {
            required_providers {
              google = {
                source  = "hashicorp/google"
                version = "~> 5.0"
              }
            }
          }
          provider "google" {
            project = "${{ secrets.GCP_PROJECT_ID }}"
            region  = "europe-west1"
          }
          EOF

      - name: Terraform Init
        working-directory: resources
        run: terraform init

      - name: Terraform Apply
        working-directory: resources
        run: terraform apply -auto-approve

  create-entity-in-port-and-update-run:
    runs-on: ubuntu-latest
    needs: createResource
    steps:
      - name: UPSERT Entity
        uses: port-labs/port-github-action@v1
        with:
          identifier: ${{ fromJson(inputs.port_context).entity }}
          blueprint: githubRepository
          properties: |-
            {
              "resource_definitions": "${{ github.server_url }}/${{ fromJson(inputs.port_context).entity }}/blob/main/resources/"
            }
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.port.io
          operation: UPSERT
          runId: ${{ fromJson(inputs.port_context).runId }}
      - name: Create a log message
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.port.io
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          logMessage: GCS bucket "${{ inputs.name }}" created successfully 🚀
